<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Luyện Kinh</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  background:
    linear-gradient(rgba(255,248,220,0.9), rgba(255,248,220,0.9)),
    url('https://cdn.pixabay.com/photo/2017/08/06/00/38/buddha-2587866_1280.jpg');
}

.card-app{
  max-width:700px;
  margin:auto;
  margin-top:20px;
  background:#fffdf5;
  padding:20px;
  border-radius:20px;
}

.compare-row{
  display:flex;
  flex-wrap:wrap;
}

.word-box{
  min-width:40px;
  text-align:center;
  padding:4px;
  margin:2px;
  border-radius:6px;
}

.word-correct{
  background:#e8f5e9;
  color:#2e7d32;
}

.word-wrong{
  background:#ffebee;
  border:1px solid red;
  color:red;
}

.word-answer{
  color:green;
  font-weight:bold;
}

.question{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.fixed-submit{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
}

/* ===== HISTORY ===== */
.history-box{
  max-height:250px;
  overflow-y:auto;
}

.history-item{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  border-left:5px solid gold;
}

.score{
  font-size:20px;
  font-weight:bold;
  color:#d4af37;
}
</style>
</head>

<body>

<div class="card-app">

<h5 class="text-center">🪷 Luyện Kinh</h5>

<div class="d-flex">
  <select id="type" class="form-control mr-2">
    <option value="daibi">Chú Đại Bi</option>
    <option value="batnha">Bát Nhã</option>
  </select>

  <select id="level" class="form-control">
    <option value="easy">Dễ</option>
    <option value="medium">Trung bình</option>
    <option value="hard">Khó</option>
  </select>
</div>

<button class="btn btn-warning btn-block mt-2" onclick="start()">Bắt đầu</button>
<button class="btn btn-secondary btn-block mt-2" onclick="scrollToHistory()">📜 Xem lịch sử</button>

<div id="quiz"></div>
<div id="result"></div>

<hr>

<h5>📊 Lịch sử</h5>
<div id="history" class="history-box"></div>

</div>

<button id="submitFixed" class="btn btn-warning fixed-submit" style="display:none;" onclick="submit()">Nộp bài</button>

<script>
let sessionId=null;
let questions=[];

async function start(){
  const level=document.getElementById('level').value;
  const type=document.getElementById('type').value;

  const res=await fetch(`/start?level=${level}&type=${type}`);
  const data=await res.json();

  sessionId=data.sessionId;
  questions=data.questions;

  render();
  document.getElementById('submitFixed').style.display='block';
}

function render(){
  let html='';
  questions.forEach((q,i)=>{
    html+=`
      <div class="question">
        <b>Câu ${i+1}:</b> ${q}
        <input class="form-control mt-2 answer">
      </div>
    `;
  });
  document.getElementById('quiz').innerHTML=html;
}

async function submit(){
  const inputs=document.querySelectorAll('.answer');
  let answers=[];
  inputs.forEach(i=>answers.push(i.value));

  const res=await fetch('/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sessionId,answers})
  });

  const data=await res.json();

  document.getElementById('quiz').innerHTML='';
  document.getElementById('submitFixed').style.display='none';

  showResult(data);
  saveHistory(data);

  setTimeout(()=>{
    document.getElementById('scoreBox').scrollIntoView({behavior:'smooth'});
  },100);
}

function showResult(data){
  let html=`<div id="scoreBox" style="font-size:28px;text-align:center;color:gold;">🏆 ${data.score.toFixed(2)}/10</div>`;

  data.results.forEach(r=>{
    if(r.correct){
      html+=`<div class="question">✔ ${r.correctAnswer}</div>`;
    }else{
      html+=`
        <div class="question">
          ❌ ${highlightWords(r.userAnswer,r.correctAnswer)}
        </div>
      `;
    }
  });

  document.getElementById('result').innerHTML=html;

  if(data.score>=8){
    confetti({particleCount:150});
  }
}

function highlightWords(user, correct){
  const u=user.split(' ');
  const c=correct.split(' ');

  let userRow='';
  let correctRow='';

  c.forEach((w,i)=>{
    const uw=u[i]||'';
    const same=uw.toLowerCase()===w.toLowerCase();

    userRow+=`<div class="word-box ${same?'word-correct':'word-wrong'}">${uw||'___'}</div>`;
    correctRow+=`<div class="word-box word-answer">${w}</div>`;
  });

  return `
    <div class="compare-row">${userRow}</div>
    <div class="compare-row">${correctRow}</div>
  `;
}

// ===== HISTORY =====
function saveHistory(data){
  let h=JSON.parse(localStorage.getItem('history')||'[]');

  h.unshift({
    score:data.score.toFixed(2),
    time:new Date().toLocaleString()
  });

  localStorage.setItem('history',JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem('history')||'[]');

  let html='';
  h.slice(0,10).forEach(i=>{
    html+=`
      <div class="history-item">
        <div class="score">🏆 ${i.score}/10</div>
        <div>🕒 ${i.time}</div>
      </div>
    `;
  });

  document.getElementById('history').innerHTML=html;
}

function scrollToHistory(){
  document.getElementById('history').scrollIntoView({behavior:'smooth'});
}

renderHistory();
</script>

</body>
</html>
