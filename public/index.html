<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Luyện Kinh</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  background:
    linear-gradient(rgba(255,248,220,0.9), rgba(255,248,220,0.9)),
    url('https://cdn.pixabay.com/photo/2017/08/06/00/38/buddha-2587866_1280.jpg');
}

.card-app{
  max-width:700px;
  margin:auto;
  margin-top:20px;
  background:#fffdf5;
  padding:20px;
  border-radius:20px;
}

.compare-row{display:flex;flex-wrap:wrap;}
.word-box{min-width:40px;text-align:center;padding:4px;margin:2px;border-radius:6px;}
.word-correct{background:#e8f5e9;color:#2e7d32;}
.word-wrong{background:#ffebee;border:1px solid red;color:red;}
.word-answer{color:green;font-weight:bold;}

.question{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.fixed-submit{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
}

.history-box{
  max-height:250px;
  overflow-y:auto;
}

.history-item{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  border-left:5px solid gold;
  cursor:pointer;
}

.score{
  font-size:20px;
  font-weight:bold;
  color:#d4af37;
}
</style>
</head>

<body>

<div class="card-app">

<h5 class="text-center">🪷 Luyện Kinh</h5>

<div class="d-flex">
  <select id="type" class="form-control mr-2">
    <option value="daibi">Chú Đại Bi</option>
    <option value="batnha">Bát Nhã</option>
  </select>

  <select id="level" class="form-control">
    <option value="easy">Dễ</option>
    <option value="medium">Trung bình</option>
    <option value="hard">Khó</option>
  </select>
</div>

<button class="btn btn-warning btn-block mt-2" onclick="start()">🔄 Làm bài mới</button>
<button class="btn btn-secondary btn-block mt-2" onclick="scrollToHistory()">📜 Xem lịch sử</button>

<div id="quiz"></div>
<div id="result"></div>

<hr>

<h5>📊 Lịch sử</h5>
<div id="history" class="history-box"></div>

</div>

<button id="submitFixed" class="btn btn-warning fixed-submit" style="display:none;" onclick="submit()">Nộp bài</button>

<!-- MODAL -->
<div class="modal fade" id="historyModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5>📜 Chi tiết bài làm</h5>
        <button class="close" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ===== JS =====
let sessionId, questions;

async function start(){
  document.getElementById('result').innerHTML='';
  document.getElementById('quiz').innerHTML='';

  const level = document.getElementById('level').value;
  const type = document.getElementById('type').value;

  const res = await fetch(`/start?level=${level}&type=${type}`);
  const data = await res.json();

  sessionId = data.sessionId;
  questions = data.questions;

  render();
  document.getElementById('submitFixed').style.display='block';

  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  let html='';
  questions.forEach((q,i)=>{
    html+=`
      <div class="question">
        <b>Câu ${i+1}:</b> ${q}
        <input class="form-control mt-2 answer">
      </div>
    `;
  });
  document.getElementById('quiz').innerHTML=html;
}

async function submit(){
  const inputs=document.querySelectorAll('.answer');
  let answers=[];
  inputs.forEach(i=>answers.push(i.value));

  const res=await fetch('/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sessionId,answers})
  });

  const data=await res.json();

  document.getElementById('quiz').innerHTML='';
  document.getElementById('submitFixed').style.display='none';

  showResult(data);
  saveHistory(data);

  setTimeout(()=>{
    document.getElementById('scoreBox').scrollIntoView({behavior:'smooth'});
  },100);
}

function showResult(data){
  let html=`<div id="scoreBox" style="font-size:28px;text-align:center;color:gold;">🏆 ${data.score.toFixed(2)}/10</div>`;
  document.getElementById('result').innerHTML=html;
}

function highlightWords(user, correct){
  const u=user.split(' ');
  const c=correct.split(' ');
  let userRow='', correctRow='';

  c.forEach((w,i)=>{
    const uw=u[i]||'';
    const same=uw.toLowerCase()===w.toLowerCase();

    userRow+=`<div class="word-box ${same?'word-correct':'word-wrong'}">${uw||'___'}</div>`;
    correctRow+=`<div class="word-box word-answer">${w}</div>`;
  });

  return `<div class="compare-row">${userRow}</div><div class="compare-row">${correctRow}</div>`;
}

// ===== HISTORY =====
function saveHistory(data){
  let h=JSON.parse(localStorage.getItem('history')||'[]');
  let stats=JSON.parse(localStorage.getItem('stats')||'{}');

  data.results.forEach(r=>{
    if(!r.correct){
      stats[r.correctAnswer]=(stats[r.correctAnswer]||0)+1;
    }
  });

  localStorage.setItem('stats',JSON.stringify(stats));

  h.unshift({
    score:data.score.toFixed(2),
    time:new Date().toLocaleString(),
    results:data.results
  });

  localStorage.setItem('history',JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem('history')||'[]');

  let html='';
  h.slice(0,10).forEach((i,index)=>{
    html+=`
      <div class="history-item" onclick="openHistory(${index})">
        <div class="score">🏆 ${i.score}/10</div>
        <div>🕒 ${i.time}</div>
      </div>
    `;
  });

  document.getElementById('history').innerHTML=html;
}

function openHistory(index){
  let h=JSON.parse(localStorage.getItem('history')||'[]');
  let stats=JSON.parse(localStorage.getItem('stats')||'{}');
  let item=h[index];

  let html=`<div id="exportArea"><h4>🏆 ${item.score}/10</h4>
  <input class="form-control mb-2" id="username" placeholder="Nhập họ tên...">`;

  item.results.forEach(r=>{
    if(r.correct){
      html+=`<div class="question">✔ ${r.correctAnswer}</div>`;
    }else{
      html+=`<div class="question">❌ ${highlightWords(r.userAnswer,r.correctAnswer)}</div>`;
    }
  });

  let top=Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  html+=`<hr><h5>❗ Sai nhiều nhất</h5>`;
  top.forEach(t=>{
    html+=`<div>🔴 ${t[0]} (${t[1]} lần)</div>`;
  });

  html+=`</div>
  <button class="btn btn-success mt-3" onclick="downloadImage()">📸 Lưu ảnh</button>`;

  document.getElementById('modalBody').innerHTML=html;
  $('#historyModal').modal('show');
}

function downloadImage(){
  const name=document.getElementById('username').value||'user';

  html2canvas(document.getElementById('exportArea')).then(canvas=>{
    const link=document.createElement('a');
    link.download=`ket-qua-${name}.png`;
    link.href=canvas.toDataURL();
    link.click();
  });
}

function scrollToHistory(){
  document.getElementById('history').scrollIntoView({behavior:'smooth'});
}

renderHistory();
</script>

</body>
</html>
